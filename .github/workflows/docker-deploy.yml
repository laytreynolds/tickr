name: Deploy (Docker)

on:
  push:
    branches: [main]
    paths: ['backend/**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/Tickr/backend
            git fetch origin main
            git reset --hard origin/main
            echo "Setting environment variables"
            echo "${{ secrets.ENV }}" > .env
            # Promtail config: always replace (file or dir) so we never leave a directory in place
            echo "Setting promtail config"
            rm -rf promtail/promtail-config.yml
            mkdir -p promtail
            cat > promtail/promtail-config.yml << 'PROMTAIL_EOF'
            ${{ secrets.PROMTAIL_CONFIG_YML }}
            PROMTAIL_EOF
            docker compose -f compose.yml up -d --build --remove-orphans
