# Disable mail when not configured (e.g. local dev without MAIL_* env vars)
spring.autoconfigure.exclude:
  - org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

springdoc:
  swagger-ui:
    enabled: true
  api-docs: 
      enabled: true

logging:
  level:
    org.flywaydb: DEBUG

management:
  endpoints.web.exposure.include: health,metrics,flyway
