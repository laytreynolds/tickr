services:
  postgres:
    image: postgres:15
    container_name: postgres
    restart: no
    environment:
      POSTGRES_DB: tickr
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d tickr"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    container_name: tickr-api
    restart: always
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
      - proxy_network

volumes:
  postgres_data:

networks:
  backend:
  proxy_network:
    external: true